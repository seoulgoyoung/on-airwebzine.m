<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울고용센터 청년 ON-AIR 웹진 아카이브</title>
    <!-- 라이브러리 로드: React, Babel, Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <!-- Lucide 아이콘 로드 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Jua', sans-serif; 
            background-color: #FAF8F2; 
            color: #334155;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* [핵심 애니메이션 효과] */
        
        /* 1. ON-AIR 텍스트 반짝반짝 (Shimmer & Glow) + R 잘림 방지 */
        @keyframes sparkle-shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(79, 70, 229, 0.4)); }
            50% { filter: drop-shadow(0 0 12px rgba(79, 70, 229, 0.8)); }
        }
        .sparkle-onair {
            background: linear-gradient(90deg, #4f46e5 0%, #818cf8 20%, #ffffff 50%, #818cf8 80%, #4f46e5 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sparkle-shimmer 2.2s linear infinite, glow-pulse 2s ease-in-out infinite;
            display: inline-block;
            padding-right: 0.15em; /* R 잘림 방지 */
            font-style: italic;
        }

        /* 2. 서울고용센터 배지 Shine 효과 */
        @keyframes shine {
            0% { background-position: -200%; }
            100% { background-position: 200%; }
        }
        .shine-badge {
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.6) 50%, transparent 70%);
            background-size: 200% 100%;
            animation: shine 3s infinite linear;
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* 3. 리포터 뱃지 반짝임 */
        @keyframes twinkle-badge {
            0%, 100% { opacity: 1; transform: scale(1) rotate(6deg); }
            50% { opacity: 0.7; transform: scale(1.1) rotate(6deg); background-color: #4338ca; }
        }
        .animate-twinkle { animation: twinkle-badge 1.5s infinite ease-in-out; }

        /* 4. 캐릭터 및 말풍선 애니메이션 */
        .animate-bounce-slow { animation: bounce-anim 2s infinite; }
        @keyframes bounce-anim { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        
        /* 5. 팝업 등장 */
        .modal-enter { animation: modalFadeIn 0.3s ease-out forwards; }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        [data-lucide] { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body class="antialiased text-center">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className = "", size = 16 }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const WEBZINE_DATA = [
            {
                id: 1, month: "3", title: "Start: 다시 피어나는 청년", issue: "Vol. 1",
                status: "published", thumbnail: "300.png", isComingSoon: true,
                description: "3-4월 주요 프로그램 후기부터 생생한 참여자 인터뷰까지!",
                cardBg: "bg-[#EEF2FF]", accent: "text-indigo-600", border: "border-indigo-400"
            },
            { id: 2, month: "5", title: "준비 중입니다", issue: "Vol. 2", status: "upcoming", thumbnail: "100.png", description: "새로운 소식으로 곧 찾아뵙겠습니다.", cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200" },
            { id: 3, month: "7", title: "준비 중입니다", issue: "Vol. 3", status: "upcoming", thumbnail: "100.png", description: "청년들의 생생한 목소리를 담아낼 예정입니다.", cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200" },
            { id: 4, month: "9", title: "준비 중입니다", issue: "Vol. 4", status: "upcoming", thumbnail: "100.png", description: "변화와 도전을 기록하는 공간입니다.", cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200" },
            { id: 5, month: "11", title: "준비 중입니다", issue: "Vol. 5", status: "upcoming", thumbnail: "100.png", description: "깊이 있는 주제로 다가가겠습니다.", cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200" },
            { id: 6, month: "12", title: "준비 중입니다", issue: "Vol. 6", status: "upcoming", thumbnail: "100.png", description: "한 해의 마무리를 담은 특별한 기록입니다.", cardBg: "bg-slate-100/50", accent: "text-slate-400", border: "border-slate-200" }
        ];

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [showModal, setShowModal] = useState(false);

            const filteredWebzines = WEBZINE_DATA.filter(w => 
                w.title.includes(searchTerm) || w.month.includes(searchTerm)
            );

            const handleSoon = (e) => {
                e.preventDefault();
                setShowModal(true);
            };

            return (
                <div className="min-h-screen flex flex-col items-center">
                    {/* 안내 팝업 */}
                    {showModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-6">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowModal(false)}></div>
                            <div className="relative bg-white rounded-[2rem] p-8 shadow-2xl max-w-xs w-full modal-enter text-center border-4 border-indigo-100">
                                <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="clock" size={32} className="text-indigo-600" />
                                </div>
                                <h4 className="text-xl text-slate-800 mb-2 font-bold text-center">잠시만요! 😊</h4>
                                <p className="text-slate-500 mb-6 leading-relaxed text-sm text-center">
                                    3월호 웹진은 현재 <br/>
                                    <span className="text-indigo-600 font-bold underline">곧 공개될 예정입니다.</span><br/>
                                    조금만 더 기다려주세요!
                                </p>
                                <button onClick={() => setShowModal(false)} className="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold active:scale-95 transition-all shadow-md">확인</button>
                            </div>
                        </div>
                    )}

                    <div className="w-full bg-indigo-600 text-white py-1.5 px-4 text-center text-[10px] sm:text-xs font-medium uppercase tracking-tight">
                        🚀 서울고용센터와 함께하는 청년들의 무한한 성장판! 
                    </div>

                    <header className="w-full bg-white border-b border-orange-100 pt-12 pb-14 px-6 flex flex-col items-center overflow-hidden">
                        <div className="max-w-xl flex flex-col items-center">
                            {/* 상단 캐릭터 */}
                            <div className="relative w-44 sm:w-52 mb-10">
                                <div className="absolute -top-4 -right-10 bg-indigo-600 text-white px-3 py-1 rounded-full shadow-lg transform rotate-6 z-20 animate-twinkle text-center">
                                    <p className="text-[10px] font-bold uppercase tracking-widest text-white text-center">ON-AIR 🎤</p>
                                </div>
                                <img src="300.png" alt="리포터" className="w-full h-auto drop-shadow-xl" />
                            </div>

                            {/* 서울고용센터 배지 */}
                            <div className="inline-flex items-center gap-2 bg-yellow-400 text-slate-900 px-6 py-2.5 rounded-full mb-8 font-bold border-2 border-yellow-500/20 shadow-md">
                                <Icon name="smile" size={20} className="text-indigo-700" />
                                <span className="text-[13px] sm:text-[15px] shine-badge relative">청년의 꿈과 가능성을 연결하는 ✨서울고용센터✨</span>
                            </div>

                            {/* 타이틀: ON-AIR 반짝반짝 */}
                            <h1 className="text-5xl sm:text-6xl font-normal text-slate-900 mb-8 leading-[1.1] tracking-tighter">
                                청년 <span className="sparkle-onair underline decoration-indigo-200 decoration-4 uppercase">ON-AIR</span><br />
                                <span className="text-4xl sm:text-5xl">웹진 아카이브</span>
                            </h1>

                            {/* --- 상단 설명 문구 (을 잘림 방지 및 정렬 수정) --- */}
                            <p className="text-slate-600 text-base sm:text-lg mb-10 leading-relaxed max-w-[340px] px-2 text-center font-medium [word-break:keep-all]">
                                서툰 첫걸음이 단단한 도약이 되기까지,<br/> 
                                서울고용센터가 청년들과 함께 일궈낸<br/> 
                                소중한 조각들을 <span className="text-indigo-600 font-bold underline decoration-indigo-100 decoration-4 whitespace-nowrap">'청년ON-AIR'</span>에서 확인하세요. ✨
                            </p>

                            <div className="relative w-full max-w-[300px] group mx-auto text-center">
                                <Icon name="search" size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-300" />
                                <input 
                                    type="text" 
                                    placeholder="월호 검색 (예: 3월)"
                                    className="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-orange-50 rounded-2xl text-base focus:outline-none focus:border-indigo-400 transition-all shadow-sm text-center font-bold"
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl w-full px-4 py-12">
                        {/* 2열 3행 고정 그리드 */}
                        <div className="grid grid-cols-2 gap-4 sm:gap-8 mb-16 text-center">
                            {filteredWebzines.map((webzine) => {
                                const isPublished = webzine.status === 'published';
                                return (
                                    <div key={webzine.id} className={`flex flex-col ${webzine.cardBg} rounded-[1.5rem] sm:rounded-[2.5rem] transition-all duration-300 border-2 overflow-hidden shadow-sm ${isPublished ? `border-indigo-400 ring-2 ring-indigo-50 scale-[1.02] z-10` : `border-dashed border-slate-200 opacity-90`}`}>
                                        <div className={`relative h-28 sm:h-48 flex items-center justify-center ${isPublished ? 'bg-white/40' : 'bg-transparent'} p-3`}>
                                            <img src={webzine.thumbnail} alt={webzine.month} className="h-full w-auto object-contain mx-auto" />
                                            <div className="absolute top-2 left-2 bg-white/90 px-2 py-0.5 rounded-full border border-white/50 z-10 shadow-sm text-slate-800 text-[9px] sm:text-[11px] font-bold">{webzine.issue}</div>
                                            
                                            {isPublished && (
                                                <div className="absolute top-2 right-2 z-30">
                                                    <div className="bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[9px] font-black shadow-lg border border-white/40 animate-pulse uppercase tracking-tighter">OPEN</div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-4 sm:p-8 flex flex-col flex-grow items-center text-center">
                                            <div className={`flex items-center gap-1 ${webzine.accent} mb-1.5 font-bold text-[10px] sm:text-sm`}><Icon name="map-pin" size={12} /><span>{webzine.month}월호 웹진</span></div>
                                            <h2 className={`text-[13px] sm:text-xl font-normal mb-2 leading-tight ${isPublished ? 'text-slate-800' : 'text-slate-400'}`}>{webzine.title}</h2>
                                            <p className={`text-[10px] sm:text-sm ${isPublished ? 'text-slate-500' : 'text-slate-400'} leading-snug mb-4 line-clamp-2 px-1 text-center`}>{webzine.description}</p>
                                            <div className="mt-auto w-full space-y-1.5">
                                                {isPublished ? (
                                                    <div className="flex flex-col gap-1.5 w-full text-center">
                                                        <a href="#" onClick={webzine.isComingSoon ? handleSoon : undefined} className="bg-indigo-600 text-white py-2.5 rounded-xl font-bold text-[11px] sm:text-sm active:scale-95 transition-all w-full block shadow-md text-center text-white">보기</a>
                                                        <a href="#" onClick={webzine.isComingSoon ? handleSoon : undefined} className="border border-indigo-200 text-indigo-600 py-2.5 rounded-xl font-bold text-[11px] sm:text-sm active:scale-95 transition-all bg-white w-full block shadow-sm text-center text-indigo-600 text-center">PDF</a>
                                                    </div>
                                                ) : (
                                                    <div className="w-full bg-slate-200/60 text-slate-500 py-4 rounded-xl font-bold text-[11px] sm:text-[13px] border-2 border-dashed border-slate-300 shadow-inner flex items-center justify-center gap-1.5">
                                                        <Icon name="clock" size={14} className="text-slate-400" />
                                                        <span>Coming Soon</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Special Archive: 2025 청년 ON-Lounge */}
                        <div className="w-full max-w-sm mx-auto bg-white/60 rounded-2xl border-2 border-amber-200 border-dashed p-6 shadow-sm flex flex-col items-center text-center">
                            <div className="flex items-center justify-center gap-2 mb-2 w-full text-center">
                                <Icon name="sparkles" className="text-amber-500" size={16} />
                                <span className="text-amber-600 font-bold text-[10px] uppercase tracking-tighter text-center">Special Archive</span>
                            </div>
                            <h3 className="text-sm text-slate-800 mb-5 leading-tight text-center font-bold text-center">지난 발자취: 2025년 청년 ON-Lounge</h3>
                            <div className="flex flex-col gap-3 w-full">
                                <a href="https://heyzine.com/flip-book/e5912678f9.html?fbclid=PAZXh0bgNhZW0CMTEAc3J0YwZhcHBfaWQMMjU2MjgxMDQwNTU4AAGn0WwSh8y8ViyC5EE5WceaGH4rXK8VWEAXedkBm3y3IsZv7I9wFUxL1gI5fAU_aem_onNWGcgHiF6eRrRe8kKI9A" target="_blank" className="relative flex items-center justify-center bg-amber-400 text-slate-900 py-3.5 rounded-xl font-bold text-[13px] active:scale-95 shadow-md w-full px-4 text-center"><Icon name="layout-grid" size={16} className="mr-2" /> <span>웹진 보러가기</span></a>
                                <a href="https://drive.google.com/file/d/1-7UAe9KPnu4hHH_ICMLe-GtsPuou9dAz/view?usp=sharing" target="_blank" className="relative flex items-center justify-center bg-white text-amber-600 border border-amber-200 py-3.5 rounded-xl font-bold text-[13px] active:scale-95 w-full shadow-sm px-4 text-amber-600 text-center"><Icon name="download" size={16} className="mr-2" /> <span>PDF 다운로드</span></a>
                            </div>
                        </div>
                    </main>

                    <footer className="w-full bg-white border-t-4 border-yellow-400 pt-12 pb-14 px-6 flex flex-col items-center text-center">
                        <div className="flex items-center gap-3 mb-4 text-left w-full justify-center text-center">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-xl rotate-6 shrink-0 border-none text-center text-center"><Icon name="file-text" size={20} className="text-white text-center" /></div>
                            <div className="text-left text-indigo-600 text-center">
                                <span className="text-xl sm:text-2xl font-normal block leading-none">서울고용센터 웹진 아카이브</span>
                                <span className="text-slate-400 text-[10px] sm:text-xs font-bold tracking-widest uppercase block mt-1 text-center">YOUTH ON-AIR STUDIO</span>
                            </div>
                        </div>
                        
                        <p className="text-slate-500 text-xs sm:text-base mb-12 leading-relaxed max-w-[320px] mx-auto text-center font-medium">이곳은 서울고용센터와 청년들이 함께 만들어가는 <br/> 꿈과 도전의 기록 저장소입니다. 우리의 내일을 응원해요!</p>
                        
                        <div className="w-full max-w-[320px] flex flex-col items-center space-y-10 mb-12 mx-auto text-center">
                            <div className="w-full bg-[#FAF8F2] p-2 rounded-[2.5rem] border border-orange-100 shadow-sm relative text-center">
                                <div className="rounded-[2rem] overflow-hidden border-4 border-white aspect-video bg-slate-200 text-center text-center">
                                    <iframe title="지도" width="100%" height="100%" frameBorder="0" style={{ border: 0 }} src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3162.51866415053!2d126.98687797636183!3d37.56641262413551!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357ca2e652a2022b%3A0xe5f9227f67713437!2z7ISc7Jq47Yq567OE7IucIOykkOq1rCDsgrzvOTrj6TrnoQgMzYz!5e0!3m2!1sko!2skr!4v1711514000000!5m2!1sko!2skr" allowFullScreen></iframe>
                                </div>
                                <a href="https://map.naver.com/p/directions/-/3zi2Hl,2AM4KL,%EC%84%9C%EC%9A%B8%EA%B3%A0%EC%9A%A9%EB%B3%B5%EC%A7%80%ED%94%8C%EB%9F%AC%EC%8A%A4%EC%84%BC%ED%84%B0,1845904326,PLACE_POI/-/car?c=15.00,0,0,0,dh" target="_blank" className="flex items-center justify-center gap-2 bg-[#03C75A] text-white py-4 mt-3 rounded-xl font-bold text-[11px] sm:text-xs active:scale-95 transition-all w-full shadow-md border-none text-center text-center"><Icon name="navigation" size={14} /> 네이버 지도 길찾기</a>
                            </div>
                            
                            <div className="flex flex-col items-center mt-10 text-center">
                                <div className="relative inline-block text-center text-center">
                                    <div className="absolute -top-16 left-1/2 -translate-x-1/2 bg-white px-5 py-3 rounded-xl shadow-md border border-orange-50 whitespace-nowrap z-20 animate-bounce-slow text-center">
                                        <p className="text-indigo-600 font-bold text-[11px] sm:text-[12px] text-center">청년의 꿈을 이뤄주는 서울고용센터에 오세요 ✨</p>
                                        <div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-3 h-3 bg-white border-b border-r border-orange-50 rotate-45 text-center text-center text-center"></div>
                                    </div>
                                    <img src="300.png" alt="캐릭터" className="w-32 h-auto drop-shadow-xl mx-auto text-center text-center" />
                                </div>
                            </div>
                        </div>

                        {/* 모바일 링크 버튼 */}
                        <div className="flex flex-col gap-3 mb-10 px-4 w-full text-center">
                            <div className="flex gap-3 text-center justify-center text-center">
                                <a href="https://www.work.go.kr/seoul/main.do" target="_blank" className="flex-1 bg-white text-indigo-600 px-4 py-4 rounded-2xl text-[12px] font-bold border-2 border-indigo-50 shadow-md active:scale-95 active:bg-indigo-50 transition-all flex items-center justify-center gap-1.5 text-center text-center">
                                    <Icon name="globe" size={14} /> 공식 홈페이지
                                </a>
                                <a href="https://www.work24.go.kr/cm/main.do" target="_blank" className="flex-1 bg-white text-indigo-600 px-4 py-4 rounded-2xl text-[12px] font-bold border-2 border-indigo-50 shadow-md active:scale-95 active:bg-indigo-50 transition-all flex items-center justify-center gap-1.5 text-center text-center">
                                    <Icon name="layout-grid" size={14} /> 고용24
                                </a>
                            </div>
                            <a href="https://www.instagram.com/moel_seoulew/" target="_blank" className="w-full bg-white text-indigo-600 px-4 py-4 rounded-2xl text-[12px] font-bold border-2 border-indigo-50 shadow-md active:scale-95 active:bg-indigo-50 transition-all flex items-center justify-center gap-1.5 text-indigo-600 text-center text-center">
                                <Icon name="instagram" size={14} /> 공식 인스타그램 바로가기
                            </a>
                        </div>

                        <div className="w-full pt-8 border-t border-slate-100 flex flex-col items-center gap-5 text-center text-center text-center text-center text-center text-center text-center">
                            <div className="flex items-center gap-5 border-none text-center">
                                <img src="서울지방고용노동청 로고 (1).png" alt="노동청" className="h-4 sm:h-6 w-auto" />
                                <img src="서울고용복지플러스센터 bi.png" alt="센터" className="h-4 sm:h-6 w-auto" />
                            </div>
                            <p className="text-slate-400 text-[9px] uppercase tracking-widest mt-2 text-center">© 2026 Seoul Employment Center. All Rights Reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
